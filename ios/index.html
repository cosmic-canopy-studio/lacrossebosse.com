<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Lacrosse Bosse on iOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #ccc; background: #111; line-height: 1.6; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px) 0 0 / 24px 24px; pointer-events: none; z-index: -1; }

        header { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem; border-bottom: 1px solid #222; }
        .icon { width: 44px; height: 44px; border-radius: 22.37%; }
        .wordmark { font-size: 1.125rem; font-weight: 700; color: #fff; letter-spacing: -0.01em; text-decoration: none; }

        main { max-width: 640px; margin: 0 auto; padding: 2.5rem 1.5rem 3rem; }
        h1 { font-size: 1.75rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .subtitle { color: #999; margin-bottom: 2rem; }

        .form-section { margin: 2rem 0; padding: 1.5rem; border: 1px solid #222; border-radius: 12px; background: #1a1a1a; }
        .form-section h2 { color: #fff; font-size: 1.125rem; margin-bottom: 0.5rem; }
        .form-section p { font-size: 0.9375rem; color: #999; margin-bottom: 1.25rem; }

        form { display: flex; flex-direction: column; gap: 0.75rem; }
        label { font-size: 0.875rem; color: #ccc; }
        input[type="email"], input[type="text"] {
            width: 100%; padding: 0.75rem 1rem; border-radius: 8px;
            border: 1px solid #333; background: #111; color: #fff;
            font-size: 1rem; font-family: inherit;
        }
        input:focus { outline: none; border-color: #007AFF; }

        .submit-btn {
            padding: 0.875rem 1.5rem; background: #007AFF; color: #fff;
            border: none; border-radius: 8px; font-weight: 600;
            font-size: 0.9375rem; cursor: pointer; transition: filter 0.15s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover { filter: brightness(1.15); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .msg { padding: 1rem; border-radius: 8px; font-size: 0.9375rem; margin-top: 1rem; display: none; }
        .msg.ok { display: block; background: #1a3a1a; border: 1px solid #2d8f47; color: #6fdc6f; }
        .msg.err { display: block; background: #3a1a1a; border: 1px solid #8f2d2d; color: #dc6f6f; }

        footer { border-top: 1px solid #222; padding: 1.5rem; text-align: center; font-size: 0.8125rem; color: #666; }
        footer a { color: #6db3f8; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <a href="../"><img class="icon" src="../assets/icon-160.webp" alt="Lacrosse Bosse" width="44" height="44"></a>
        <a class="wordmark" href="../">Lacrosse Bosse</a>
    </header>

    <main>
        <h1>Lacrosse Bosse for iPhone &amp; iPad</h1>
        <p class="subtitle">Coming soon to the App Store. Sign up below for early beta access via TestFlight.</p>

        <div class="form-section" id="form-section">
            <h2>Request Early Access</h2>
            <p>We'll email you an invite link. Once the app is public, no signup will be needed.</p>

            <form id="access-form">
                <input type="text" name="captcha" style="display:none" tabindex="-1" autocomplete="off">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
                <label for="club">Club / team name</label>
                <input type="text" id="club" name="club" placeholder="e.g. Baltimore Crabs LC" required>
                <button type="submit" class="submit-btn" id="btn">Request Access</button>
            </form>
        </div>

        <div class="msg" id="msg"></div>
    </main>

    <footer>
        <a href="../privacy/">Privacy</a> · <a href="mailto:support@lacrossebosse.com">Support</a><br>
        &copy; 2025–2026 Cosmic Canopy Studio
    </footer>

    <script>
        const API = "https://7hvgs5lmag.execute-api.us-east-1.amazonaws.com/submit";
        const form = document.getElementById("access-form");
        const btn = document.getElementById("btn");
        const msg = document.getElementById("msg");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = "Sending…";
            msg.className = "msg";

            const data = { email: form.email.value, club: form.club.value, captcha: form.captcha.value };

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (res.ok) {
                    msg.textContent = "✓ You're on the list! We'll email you when the beta is ready.";
                    msg.className = "msg ok";
                    document.getElementById("form-section").style.display = "none";
                } else {
                    msg.textContent = json.error || "Something went wrong. Try again.";
                    msg.className = "msg err";
                    btn.disabled = false;
                    btn.textContent = "Request Access";
                }
            } catch {
                msg.textContent = "Network error. Check your connection and try again.";
                msg.className = "msg err";
                btn.disabled = false;
                btn.textContent = "Request Access";
            }
        });
    </script>
</body>
</html>
